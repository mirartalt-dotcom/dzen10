<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F4F1EA">
<title>Клуб DZEN — тренировка дня</title>
<style>
:root{
  --paper:#F4F1EA; --zen:#EFF2E4; --ink:#2B2A26; --muted:#6E6A5F; --line:#DFDACE; --card:#FBFAF6;
  --lime:#A8C96B; --lime-d:#56732E; --lime-l:#ECF0DD;
  --terra:#C0563E; --terra-d:#8A3A28; --terra-l:#F4E3DD;
  --mango:#C2791B; --grape:#7A5C93;
  --ease:cubic-bezier(.22,.61,.36,1); --spring:cubic-bezier(.34,1.42,.5,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,"Segoe UI",Roboto,sans-serif;line-height:1.45;min-height:100vh}
#app{max-width:560px;margin:0 auto;padding:20px 20px 48px}
.top{display:flex;justify-content:space-between;align-items:center;padding:4px 2px 18px;font-size:12px;color:var(--muted);letter-spacing:.08em}
.brand{font-weight:700;letter-spacing:.14em;color:var(--lime-d)}
h1{font-size:30px;line-height:1.16;letter-spacing:-.02em;font-weight:700}
h2{font-size:21px;line-height:1.2;letter-spacing:-.01em;font-weight:700}
.sub{color:var(--muted);font-size:15px;margin-top:10px}
.small{font-size:12.5px;color:var(--muted)}
.rise{opacity:0;animation:rise .6s var(--spring) forwards}
@keyframes rise{from{opacity:0;transform:translateY(16px) scale(.985)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes draw{to{stroke-dashoffset:0}}
.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:22px}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:26px 22px;margin-top:18px}
.qtitle{font-size:23px;font-weight:700;letter-spacing:-.01em;line-height:1.2}
.qsub{color:var(--muted);font-size:14.5px;margin-top:8px}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}
.btn{appearance:none;border:none;border-radius:20px;padding:16px 18px;font-size:17px;font-weight:600;font-family:inherit;cursor:pointer;transition:transform .18s var(--spring),background .2s var(--ease);color:var(--ink)}
.btn:active{transform:scale(.96)}
.btn-yes{background:var(--lime);color:#243312}
.btn-no{background:var(--paper);border:1px solid var(--line);color:var(--muted)}
.btn-main{display:block;width:100%;background:var(--ink);color:var(--card);margin-top:12px;text-align:center}
.btn-soft{display:block;width:100%;background:var(--card);border:1px solid var(--line);margin-top:10px;text-align:center;color:var(--ink)}
.btn-lime{display:block;width:100%;background:var(--lime);color:#243312;margin-top:12px;text-align:center}
.prog{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:14px}
.prog i{display:block;height:100%;background:var(--lime);border-radius:2px;transition:width .5s var(--ease)}
.progtxt{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--muted)}
.react{margin-top:14px;font-size:14px;color:var(--muted);min-height:20px;font-style:italic}
.teaser{margin-top:18px;border:1px dashed var(--line);border-radius:18px;padding:12px 16px;font-size:13px;color:var(--muted);display:flex;gap:10px;align-items:center}
.teaser b{filter:blur(4px);color:var(--lime-d);font-weight:700}
.shot{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:24px 22px 18px;position:relative;overflow:hidden}
.shot .club{font-size:11px;letter-spacing:.16em;color:var(--lime-d);font-weight:700;text-transform:uppercase}
.shot .date{font-size:12px;color:var(--muted)}
.shot h2{margin-top:10px;font-size:24px}
.routeWrap{margin:16px -6px 4px}
.routeWrap svg{width:100%;height:auto;display:block}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;text-align:center}
.metric{background:var(--paper);border-radius:18px;padding:12px 6px 10px}
.metric b{display:block;font-size:26px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.metric span{font-size:10.5px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.m-h b{color:var(--lime-d)} .m-p b{color:var(--terra)} .m-s b{color:var(--ink)}
.chip{display:inline-block;background:var(--lime-l);color:var(--lime-d);border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:600;margin-top:14px}
.chip-k{background:var(--terra-l);color:var(--terra-d);margin-left:6px}
.quip{margin-top:12px;font-size:14px;color:var(--ink)}
.pctline{margin-top:6px;font-size:12.5px;color:var(--muted)}
.shotfoot{margin-top:16px;padding-top:12px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);letter-spacing:.04em;display:flex;justify-content:space-between}
.flip{background:var(--lime-l);border:1px solid #DDE6C4;border-radius:24px;padding:22px;margin-top:14px;display:flex;gap:18px;align-items:center}
.flip h3{font-size:17px;line-height:1.3;font-weight:700}
.flip p{font-size:13.5px;color:var(--lime-d);margin-top:6px}
.can{flex:0 0 56px;width:56px;height:88px;border-radius:13px;background:linear-gradient(160deg,#C4DC90,#A8C96B 45%,#87A751);position:relative;box-shadow:inset -6px 0 12px rgba(0,0,0,.08),inset 5px 0 10px rgba(255,255,255,.35)}
.can::before{content:"";position:absolute;top:0;left:6%;right:6%;height:7px;border-radius:6px;background:#E9EFDA}
.can i{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;font-style:normal;font-weight:800;letter-spacing:.34em;color:#FBFAF6;font-size:15px}
.sect{margin-top:26px}
.sect h3{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.demo-badge{background:var(--terra-l);color:var(--terra-d);border-radius:999px;padding:2px 9px;font-size:10px;letter-spacing:.08em}
.week{display:flex;gap:8px;justify-content:space-between;margin-top:14px}
.wd{flex:1;text-align:center}
.wd i{display:block;width:26px;height:26px;margin:0 auto;border-radius:50%;border:2px solid var(--line);font-style:normal;line-height:22px;font-size:13px}
.wd.done i{background:var(--lime);border-color:var(--lime);color:#243312;font-weight:700}
.wd.miss i{border-color:var(--terra-l);background:var(--terra-l)}
.wd span{display:block;font-size:10px;color:var(--muted);margin-top:5px}
.feedrow{display:flex;align-items:baseline;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);font-size:14px}
.feedrow:last-child{border-bottom:none}
.feedrow .fd{color:var(--muted);font-size:12px;flex:0 0 44px;font-variant-numeric:tabular-nums}
.feedrow .ft{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feedrow .fm{color:var(--muted);font-size:12px;white-space:nowrap}
.kbig{font-size:64px;text-align:center;animation:pop .7s var(--spring) both}
.kbtn{width:100%;border:none;border-radius:22px;background:var(--lime);color:#243312;font-size:19px;font-weight:700;font-family:inherit;padding:18px;margin-top:16px;cursor:pointer;transition:transform .18s var(--spring)}
.kbtn:active{transform:scale(.95)}
.timer{font-variant-numeric:tabular-nums;font-weight:700;color:var(--ink)}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--card);padding:12px 20px;border-radius:999px;font-size:14px;transition:transform .45s var(--spring);z-index:9;max-width:88vw;text-align:center}
.toast.on{transform:translateX(-50%) translateY(0)}
.foot{margin-top:34px;text-align:center}
.foot button{background:none;border:none;color:var(--muted);font-size:11.5px;font-family:inherit;text-decoration:underline;text-decoration-color:var(--line);cursor:pointer;padding:6px}
.calc{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.calc .dotp{display:flex;gap:8px;margin-top:20px}
.calc .dotp i{width:9px;height:9px;border-radius:50%;background:var(--lime);animation:pulse 1s infinite}
.calc .dotp i:nth-child(2){animation-delay:.2s}.calc .dotp i:nth-child(3){animation-delay:.4s}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-delay:0ms!important;transition:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
/* =================== ПРИВЫЧКИ (канон) =================== */
var HABITS=[
 {id:'sleep', t:'Лёг до 23:00', s:'вместо второго сезона, который сам себя не досмотрит', health:18, pain:14, lbl:'Сон'},
 {id:'sweets',t:'Не взял сладкое к чаю', s:'вместо печенья, которое так грустно на тебя смотрит', health:12, pain:17, lbl:'Сладкое'},
 {id:'gym',   t:'Пошёл в зал через лень', s:'вместо дивана, который считал тебя своим', health:23, pain:15, lbl:'Зал'},
 {id:'phone', t:'Не залип в телефоне', s:'вместо ленты, в которую зашёл на минутку ещё час назад', health:10, pain:12, lbl:'Телефон'},
 {id:'wb',    t:'Не купил из вайлдбериза', s:'вместо корзины, где уже лежала твоя новая жизнь', health:8, pain:10, lbl:'WB'}
];
var DZQ={id:'dz', t:'Выпил DZEN', s:'единственная кнопка, где платят удовольствием', health:16, joy:14};
var BATTLES={
 sleep:{t:'битва со вторым сезоном',g:'f'},
 sweets:{t:'битва с печеньем',g:'f'},
 gym:{t:'марш-бросок мимо дивана',g:'m'},
 phone:{t:'побег из ленты',g:'m'},
 wb:{t:'рейд мимо корзины WB',g:'m'}
};
var ADJ={m:['Ночной','Утренний','Дневной','Вечерний'],f:['Ночная','Утренняя','Дневная','Вечерняя'],n:['Ночное','Утреннее','Дневное','Вечернее']};
var REACT={
 sleep:['Сериал подождёт. Он умеет.','Второй сезон победил. Бывает.'],
 sweets:['Печенье грустит, ты держишься.','Печенье выиграло этот раунд.'],
 gym:['Диван подал на развод.','Диван снова считал тебя своим.'],
 phone:['Лента осталась без тебя. Переживёт.','Минутка длиной в час. Классика.'],
 wb:['Корзина хранит твою новую жизнь ещё день.','Курьер уже в пути. Ну что ж.'],
 dz:['Пшш. Польза, которую не надо терпеть.','Банка подождёт в холодильнике Додо.']
};
var MONTHS=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
var DOW=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

/* =================== ЧИСТЫЕ ФУНКЦИИ =================== */
function pad2(n){return (n<10?'0':'')+n;}
function isoOf(dt){return dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate());}
function ruDate(iso){var p=iso.split('-');return (+p[2])+' '+MONTHS[+p[1]-1];}
function shortDate(iso){var p=iso.split('-');return p[2]+'.'+p[1];}
function hourBucket(h){return h<5?0:(h<12?1:(h<18?2:3));}
function makeTitle(done,hour){
  var b;
  if(done.length===0)b={t:'прогулка без подвигов',g:'f'};
  else if(done.length===5)b={t:'пятиборье силы воли',g:'n'};
  else{
    var best=null;
    for(var i=0;i<HABITS.length;i++){var h=HABITS[i];
      if(done.indexOf(h.id)>=0&&(!best||h.pain>best.pain))best=h;}
    b=BATTLES[best.id];
  }
  return ADJ[b.g][hourBucket(hour)]+' '+b.t;
}
function calcScores(done,dz){
  var h=0,p=0;
  for(var i=0;i<HABITS.length;i++){if(done.indexOf(HABITS[i].id)>=0){h+=HABITS[i].health;p+=HABITS[i].pain;}}
  if(dz)h+=DZQ.health;
  return {h:h,p:p};
}
function prevIso(iso){var p=iso.split('-');var d=new Date(+p[0],+p[1]-1,+p[2]);d.setDate(d.getDate()-1);return isoOf(d);}
function calcStreak(hist,todayIso){var n=0,d=todayIso;while(hist[d]){n++;d=prevIso(d);}return n;}
function totalDays(hist){var n=0;for(var k in hist)if(Object.prototype.hasOwnProperty.call(hist,k))n++;return n;}
var RANKS=[[30,'Тихая легенда'],[14,'Опора клуба'],[7,'Надёжный страдалец'],[3,'Свой человек'],[1,'Новенький в клубе']];
function rankFor(n){
  for(var i=0;i<RANKS.length;i++){if(n>=RANKS[i][0]){
    var next=i>0?{name:RANKS[i-1][1],left:RANKS[i-1][0]-n}:null;
    return {name:RANKS[i][1],next:next};
  }}
  return {name:'Гость клуба',next:{name:'Новенький в клубе',left:1}};
}
function seedRand(str){
  var h=2166136261;
  for(var i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}
  return function(){
    h+=0x6D2B79F5;var t=h;
    t=Math.imul(t^(t>>>15),t|1);
    t^=t+Math.imul(t^(t>>>7),t|61);
    return ((t^(t>>>14))>>>0)/4294967296;
  };
}
function routePts(seedStr){
  var rnd=seedRand(seedStr),pts=[],x,y,i;
  for(i=0;i<7;i++){
    x=16+i*48;
    y=80+(rnd()-0.5)*104;
    if(i>0&&Math.abs(y-pts[i-1].y)<24)y+=(y>=80?34:-34);
    y=Math.max(30,Math.min(130,y));
    pts.push({x:Math.round(x),y:Math.round(y)});
  }
  return pts;
}
function catmull(pts){
  var d='M '+pts[0].x+' '+pts[0].y,i,p0,p1,p2,p3,c1x,c1y,c2x,c2y;
  for(i=0;i<pts.length-1;i++){
    p0=pts[Math.max(i-1,0)];p1=pts[i];p2=pts[i+1];p3=pts[Math.min(i+2,pts.length-1)];
    c1x=p1.x+(p2.x-p0.x)/6;c1y=p1.y+(p2.y-p0.y)/6;
    c2x=p2.x-(p3.x-p1.x)/6;c2y=p2.y-(p3.y-p1.y)/6;
    d+=' C '+c1x.toFixed(1)+' '+c1y.toFixed(1)+' '+c2x.toFixed(1)+' '+c2y.toFixed(1)+' '+p2.x+' '+p2.y;
  }
  return d;
}
function pctOf(p){return Math.max(5,Math.min(96,Math.round(28+p*0.85)));}
function quipFor(cnt,dz){
  if(cnt===0)return dz?'Ноль подвигов, одна банка. Честный кайф.':'Пока ты просто живёшь. Ни пользы, ни боли.';
  if(cnt<=2)return 'Здоровье кивнуло, диван обиделся.';
  if(cnt<=4)return 'Три подвига за день. Ты почти святой, только злой и голодный.';
  return 'Пять из пяти. Идеальный человек — и абсолютно вымотанный.';
}
function dotsLine(done,dz){
  var s='';
  for(var i=0;i<HABITS.length;i++)s+=(done.indexOf(HABITS[i].id)>=0)?'🟢':'⚪';
  return s+(dz?' 🥤':'');
}
/* base64url без btoa — чтобы работало и в jsc */
var B64A='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
function b64e(s){
  var es=encodeURIComponent(s),bytes=[],i,b0,b1,b2,out='';
  for(i=0;i<es.length;i++){
    if(es.charAt(i)==='%'){bytes.push(parseInt(es.substr(i+1,2),16));i+=2;}
    else bytes.push(es.charCodeAt(i));
  }
  for(i=0;i<bytes.length;i+=3){
    b0=bytes[i];b1=bytes[i+1];b2=bytes[i+2];
    out+=B64A.charAt(b0>>2)+B64A.charAt(((b0&3)<<4)|((b1||0)>>4));
    out+=(b1===undefined)?'':B64A.charAt(((b1&15)<<2)|((b2||0)>>6));
    out+=(b2===undefined)?'':B64A.charAt(b2&63);
  }
  return out;
}
function b64d(s){
  var bytes=[],buf=0,bits=0,i,v,hex='';
  for(i=0;i<s.length;i++){
    v=B64A.indexOf(s.charAt(i));if(v<0)continue;
    buf=(buf<<6)|v;bits+=6;
    if(bits>=8){bits-=8;bytes.push((buf>>bits)&255);}
  }
  for(i=0;i<bytes.length;i++){v=bytes[i].toString(16);hex+='%'+(v.length<2?'0':'')+v;}
  return decodeURIComponent(hex);
}
function enc(o){return b64e(JSON.stringify(o));}
function dec(s){return JSON.parse(b64d(s));}
function weekOf(todayIso){
  var p=todayIso.split('-'),dt=new Date(+p[0],+p[1]-1,+p[2]);
  var dow=(dt.getDay()+6)%7,out=[],i,d;
  for(i=0;i<7;i++){d=new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()-dow+i);out.push(isoOf(d));}
  return out;
}
function wbWeek(hist,todayIso){
  var wk=weekOf(todayIso),st=[],cnt=0,i,c;
  for(i=0;i<7;i++){
    c=hist[wk[i]];
    if(!c)st.push('none');
    else if(c.done.indexOf('wb')>=0){st.push('done');cnt++;}
    else st.push('miss');
  }
  return {days:st,count:cnt,week:wk};
}
function rnum(n){return n<0?'−'+(-n):''+n;}

/* =================== САМОТЕСТ ДЛЯ jsc =================== */
if(typeof document==='undefined'){
  var P=(typeof print==='function')?print:function(m){console.log(m);};
  var ok=true;
  function T(name,cond){if(!cond){ok=false;P('FAIL: '+name);}}
  var rt=dec(enc({t:'c',d:'2026-07-18',ti:'Вечерняя битва с печеньем',h:30,p:31,s:3,m:['sweets','gym'],dz:1}));
  T('enc/dec roundtrip',rt.ti==='Вечерняя битва с печеньем'&&rt.h===30&&rt.m.length===2&&rt.dz===1);
  T('title dominant pain',makeTitle(['sweets','wb'],20)==='Вечерняя битва с печеньем');
  T('title gender m',makeTitle(['gym'],9)==='Утренний марш-бросок мимо дивана');
  T('title empty',makeTitle([],2)==='Ночная прогулка без подвигов');
  T('title all',makeTitle(['sleep','sweets','gym','phone','wb'],13)==='Дневное пятиборье силы воли');
  var sc=calcScores(['sleep','gym'],true);
  T('scores',sc.h===18+23+16&&sc.p===14+15);
  T('scores empty',calcScores([],false).h===0);
  var hist={'2026-07-18':1,'2026-07-17':1,'2026-07-16':1,'2026-07-13':1};
  T('streak',calcStreak(hist,'2026-07-18')===3);
  T('streak none',calcStreak(hist,'2026-07-10')===0);
  T('prevIso month edge',prevIso('2026-07-01')==='2026-06-30');
  T('rank 1',rankFor(1).name==='Новенький в клубе');
  T('rank 7',rankFor(7).name==='Надёжный страдалец');
  T('rank next',rankFor(4).next.name==='Надёжный страдалец'&&rankFor(4).next.left===3);
  var pts=routePts('2026-07-18');
  T('route 7 pts',pts.length===7&&pts[0].x===16&&pts[6].x===304);
  var okY=true;for(var pi=0;pi<7;pi++){if(pts[pi].y<30||pts[pi].y>130)okY=false;}
  T('route y bounds',okY);
  T('catmull path',catmull(pts).indexOf('M 16')===0&&catmull(pts).indexOf('C ')>0);
  var wk=weekOf('2026-07-18');
  T('week starts monday',wk[0]==='2026-07-13'&&wk[6]==='2026-07-19');
  var ww=wbWeek({'2026-07-14':{done:['wb']},'2026-07-15':{done:['gym']}},'2026-07-18');
  T('wb week',ww.count===1&&ww.days[1]==='done'&&ww.days[2]==='miss'&&ww.days[0]==='none');
  T('pct bounds',pctOf(0)>=5&&pctOf(200)<=96);
  T('quip 5',quipFor(5,false).indexOf('Пять из пяти')===0);
  T('dots',dotsLine(['sleep'],true).length>0);
  P(ok?'SELFTEST OK':'SELFTEST FAILED');
}else{
/* =================== ПРИЛОЖЕНИЕ =================== */

function pshh(){
  try{
    var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
    var ctx=new AC(),len=Math.floor(ctx.sampleRate*0.4);
    var buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);
    for(var i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.6);
    var src=ctx.createBufferSource();src.buffer=buf;
    var f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=5200;f.Q.value=0.6;
    var g=ctx.createGain();g.gain.setValueAtTime(0.16,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    src.connect(f);f.connect(g);g.connect(ctx.destination);src.start();
  }catch(e){}
}
function toast(msg){

function reduced(){try{return window.matchMedia('(prefers-reduced-motion: reduce)').matches;}catch(e){return false;}}
function runCounts(){
  var els=document.querySelectorAll('[data-cnt]');
  for(var i=0;i<els.length;i++)(function(el){
    var to=parseInt(el.getAttribute('data-cnt'),10)||0;
    if(reduced()){el.textContent=to;return;}
    var t0=null,dur=900;
    function step(t){
      if(!t0)t0=t;
      var k=Math.min(1,(t-t0)/dur);
      el.textContent=Math.round(to*(1-Math.pow(1-k,3)));
      if(k<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  })(els[i]);
}

function routeSvg(card,opts){

  var pts=routePts(card.d),path=catmull(pts),i,h,done,cx,cy,sHtml='';

  sHtml+='<path d="'+path+'" fill="none" stroke="#DFDACE" stroke-width="6" stroke-linecap="round"/>';
  sHtml+='<path d="'+path+'" fill="none" stroke="#A8C96B" stroke-width="3" stroke-linecap="round" pathLength="1"'+
    (anim?' stroke-dasharray="1" stroke-dashoffset="1" style="animation:draw 1.5s var(--ease) .3s forwards"':'')+'/>';
  /* старт */

  if(labels)sHtml+='<text x="'+pts[0].x+'" y="'+(pts[0].y+16)+'" font-size="8.5" fill="#6E6A5F" text-anchor="middle">старт</text>';
  /* привычки */
  for(i=0;i<HABITS.length;i++){
    h=HABITS[i];done=card.done.indexOf(h.id)>=0;
    cx=pts[i+1].x;cy=pts[i+1].y;
    if(done)sHtml+='<circle cx="'+cx+'" cy="'+cy+'" r="6.5" fill="#A8C96B" stroke="#56732E" stroke-width="1.6"'+(anim?' style="animation:pop .5s var(--spring) '+(0.5+i*0.22)+'s both"':'')+'/>';
    else sHtml+='<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="#FBFAF6" stroke="#DFDACE" stroke-width="1.8"/>';
    if(labels)sHtml+='<text x="'+cx+'" y="'+(cy+(cy>110?-12:18))+'" font-size="8.5" fill="#6E6A5F" text-anchor="middle">'+h.lbl+'</text>';
  }
  /* финиш */
  cx=pts[6].x;cy=pts[6].y;
  if(card.dz){
    sHtml+='<circle cx="'+cx+'" cy="'+cy+'" r="8.5" fill="#ECF0DD" stroke="#56732E" stroke-width="2"'+(anim?' style="animation:pop .5s var(--spring) 1.7s both"':'')+'/>';
    sHtml+='<text x="'+cx+'" y="'+(cy+3)+'" font-size="6.5" font-weight="700" fill="#56732E" text-anchor="middle">DZ</text>';
    if(labels)sHtml+='<text x="'+cx+'" y="'+(cy+(cy>110?-14:20))+'" font-size="8.5" fill="#56732E" text-anchor="middle">DZEN</text>';
  }else{
    sHtml+='<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="#2B2A26"/>';
    if(labels)sHtml+='<text x="'+cx+'" y="'+(cy+(cy>110?-12:16))+'" font-size="8.5" fill="#6E6A5F" text-anchor="middle">финиш</text>';
  }
  sHtml+='</svg>';
  return '<div class="routeWrap">'+sHtml+'</div>';
}

    route();
  },
  demoOff:function(){
    try{
      var b=JSON.parse(S.backup||'{}');
      S.hist=b.hist||{};S.kudos=b.kudos||{};S.kudosIds=b.kudosIds||S.kudosIds;
    }catch(e){S.hist={};S.kudos={};}
    S.demo=false;S.backup=null;
    save();
    toast('Вернул как было');
    route();
  }
};

/* ---------- Маршрутизация ---------- */
function route(){
  var h=location.hash||'';
  if(h.indexOf('#c=')===0){
    try{var c=dec(h.slice(3));if(c&&c.t==='c'){rFriend(c);return;}}catch(e){}
  }
  if(h.indexOf('#k=')===0){
    try{var k=dec(h.slice(3));if(k&&k.t==='k'){rKudosIn(k);return;}}catch(e){}
  }
  var today=isoOf(new Date());
  if(S.hist[today]){rToday();}
  else{qIdx=0;answers={};lastReact='';rQuiz();}
}
window.addEventListener('hashchange',route);
route();
}
</script>
</body>
