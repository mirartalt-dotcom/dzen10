<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F4F1EA">
<meta name="description" content="Переписка с внутренним голосом: сколько ты страдаешь, чтобы быть здоровым.">
<title>DZEN — диалог с внутренним голосом</title>
<style>
:root{
  --paper:#F4F1EA; --zen:#EFF2E4; --ink:#2B2A26; --muted:#6E6A5F;
  --line:#DFDACE; --card:#FBFAF6;
  --lime:#A8C96B; --lime-d:#56732E; --lime-l:#ECF0DD;
  --terra:#C0563E; --terra-d:#8A3A28; --terra-l:#F4E3DD;
  --ease:cubic-bezier(.22,.61,.36,1);
  --spring:cubic-bezier(.34,1.42,.5,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--paper); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.app{
  display:flex; flex-direction:column;
  height:100dvh; max-width:520px; margin:0 auto; position:relative;
  background:var(--paper);
}
@media(min-width:720px){
  body{background:#EAE6DB; display:flex; align-items:center; justify-content:center}
  .app{height:min(860px,calc(100dvh - 48px)); border-radius:28px; overflow:hidden;
    border:1px solid var(--line); box-shadow:0 24px 60px rgba(43,42,38,.12)}
}
/* ── шапка ── */
header{
  display:flex; align-items:center; gap:12px;
  padding:14px 16px 12px; border-bottom:1px solid var(--line);
  background:rgba(244,241,234,.92); backdrop-filter:blur(8px);
  position:relative; z-index:5;
}
.ava{
  width:42px; height:42px; border-radius:50%; flex:none;
  background:radial-gradient(circle at 30% 28%, #C7DD94, var(--lime) 58%, #8FB84F);
  display:flex; align-items:center; justify-content:center;
  color:var(--lime-d); font-size:20px; font-weight:700;
  box-shadow:inset 0 -2px 6px rgba(86,115,46,.25);
}
.who{min-width:0; flex:1}
.who b{display:block; font-size:15px; letter-spacing:-.2px}
.who i{display:block; font-style:normal; font-size:12px; color:var(--muted); margin-top:1px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.pills{display:flex; gap:6px}
.pill{
  border:1px solid var(--line); background:var(--card); border-radius:16px;
  padding:5px 10px 4px; text-align:center; min-width:62px;
  transition:background .6s var(--ease), border-color .6s var(--ease);
}
.pill b{display:flex; align-items:center; justify-content:center; gap:5px;
  font-size:15px; letter-spacing:-.3px; font-variant-numeric:tabular-nums}
.pill i{display:block; font-style:normal; font-size:9px; letter-spacing:.4px;
  text-transform:uppercase; color:var(--muted); margin-top:1px}
.dot{width:7px; height:7px; border-radius:50%; flex:none}
#pillH .dot{background:var(--lime)} #pillH b{color:var(--lime-d)}
#pillP .dot{background:var(--terra)} #pillP b{color:var(--terra-d)}
#pillP{transition:all .6s var(--ease)}
#pillP.joy{background:var(--lime-l); border-color:var(--lime)}
#pillP.joy .dot{background:var(--lime)} #pillP.joy b{color:var(--lime-d)}
.pill.bump{animation:bump .5s var(--spring)}
@keyframes bump{40%{transform:scale(1.12)}}
/* ── чат ── */
#chat{
  flex:1; overflow-y:auto; overscroll-behavior:contain;
  display:flex; flex-direction:column; gap:10px;
  padding:18px 16px 12px; scroll-behavior:smooth;
}
.msg{
  max-width:82%; padding:11px 15px; border-radius:22px;
  font-size:15px; line-height:1.42; letter-spacing:-.1px;
  animation:pop .55s var(--spring) both; word-wrap:break-word;
}
.msg b{font-weight:700}
.voice{align-self:flex-start; background:var(--card); border:1px solid var(--line);
  border-bottom-left-radius:8px}
.user{align-self:flex-end; background:var(--lime-l); border:1px solid #DCE5C4;
  border-bottom-right-radius:8px}
@keyframes pop{
  from{opacity:0; transform:translateY(16px) scale(.95)}
  60%{opacity:1; transform:translateY(-3px) scale(1.01)}
  to{opacity:1; transform:translateY(0) scale(1)}
}
.typing{display:flex; gap:5px; padding:16px 18px; align-items:center}
.typing span{width:7px; height:7px; border-radius:50%; background:var(--muted);
  opacity:.35; animation:blink 1.1s infinite}
.typing span:nth-child(2){animation-delay:.18s}
.typing span:nth-child(3){animation-delay:.36s}
@keyframes blink{40%{opacity:1; transform:translateY(-2px)}}
.sysnote{align-self:center; background:none; border:none; color:var(--muted);
  font-size:12.5px; padding:2px 8px; text-align:center}
.sysnote .blur{filter:blur(7px); font-weight:700; color:var(--terra-d)}
/* голосовое */
.vnote{display:flex; align-items:center; gap:10px}
.vnote .play{
  width:38px; height:38px; border-radius:50%; border:none; flex:none; cursor:pointer;
  background:var(--lime); color:var(--lime-d); font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:transform .3s var(--spring); touch-action:manipulation;
}
.vnote .play:active{transform:scale(.9)}
.wave{display:flex; align-items:center; gap:2px; height:26px}
.wave b{width:3px; border-radius:2px; background:var(--line); transition:background .25s var(--ease)}
.playing .wave b{background:var(--lime-d)}
.vtime{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums}
.vhint{display:block; font-size:11.5px; color:var(--muted); margin-top:7px}
/* результат */
.result-num{text-align:left; padding:16px 20px}
.result-num .n{display:block; font-size:44px; font-weight:800; letter-spacing:-1.5px;
  color:var(--terra-d); line-height:1.05; font-variant-numeric:tabular-nums}
.result-num .s{display:block; font-size:13px; color:var(--muted); margin-top:4px}
.final{background:linear-gradient(135deg,var(--zen),var(--lime-l));
  border-color:#D6E0BC; font-size:19px; font-weight:700; letter-spacing:-.3px;
  color:var(--lime-d); padding:16px 20px}
/* банка */
.dzcard{display:flex; gap:16px; align-items:center; padding:6px 2px}
.can{
  width:64px; height:118px; flex:none; border-radius:14px 14px 16px 16px; position:relative;
  background:linear-gradient(160deg,#C7DD94 0%,var(--lime) 45%,#87AE47 100%);
  box-shadow:inset -8px 0 14px rgba(86,115,46,.30), inset 6px 0 10px rgba(255,255,255,.35),
    0 8px 18px rgba(86,115,46,.22);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.can::before{content:''; position:absolute; top:0; left:8%; right:8%; height:7px;
  border-radius:0 0 8px 8px; background:linear-gradient(#E9EEDB,#C9CDB8)}
.can b{writing-mode:vertical-rl; font-size:21px; font-weight:800; letter-spacing:5px;
  color:#FBFAF6; text-shadow:0 1px 2px rgba(86,115,46,.4)}
.can span{position:absolute; bottom:9px; font-size:7.5px; letter-spacing:1.2px;
  text-transform:uppercase; color:var(--lime-l)}
.dzinfo{min-width:0}
.dzinfo b{font-size:16px; letter-spacing:-.2px}
.dzinfo p{font-size:12px; color:var(--muted); margin:5px 0 8px; line-height:1.5}
.dzinfo em{font-style:normal; font-size:13.5px; font-weight:600; color:var(--lime-d)}
/* ── док с кнопками ── */
#dock{
  padding:10px 16px calc(14px + env(safe-area-inset-bottom));
  display:flex; flex-direction:column; align-items:flex-end; gap:8px;
  border-top:1px solid var(--line); background:rgba(244,241,234,.94); min-height:64px;
}
.choice,.cta{
  border:1px solid var(--line); background:var(--card); color:var(--ink);
  font:inherit; font-size:15px; letter-spacing:-.1px; text-align:right;
  padding:12px 18px; border-radius:22px; border-bottom-right-radius:10px;
  cursor:pointer; max-width:88%; touch-action:manipulation;
  animation:pop .5s var(--spring) both;
  transition:transform .25s var(--spring), background .3s var(--ease), border-color .3s var(--ease);
}
.choice:active,.cta:active{transform:scale(.96); background:var(--lime-l); border-color:var(--lime)}
.cta{align-self:stretch; max-width:none; text-align:center; font-weight:700;
  background:var(--lime); border-color:var(--lime); color:var(--lime-d);
  border-radius:22px; padding:14px}
.ghost{background:none; border:none; color:var(--muted); font:inherit; font-size:13px;
  align-self:center; cursor:pointer; padding:4px 10px; touch-action:manipulation}
/* ── шеринг ── */
#share{
  position:fixed; inset:0; z-index:50; background:var(--paper);
  display:none; flex-direction:column; align-items:center;
  overflow-y:auto; padding:20px 16px calc(20px + env(safe-area-inset-bottom));
}
#share.open{display:flex; animation:fadein .35s var(--ease) both}
@keyframes fadein{from{opacity:0; transform:translateY(14px)}}
#shcard{
  width:100%; max-width:390px; background:var(--card); border:1px solid var(--line);
  border-radius:26px; padding:20px 18px; box-shadow:0 14px 40px rgba(43,42,38,.10);
}
#shcard .sh-title{font-size:11px; letter-spacing:1.4px; text-transform:uppercase;
  color:var(--muted); text-align:center; margin-bottom:14px}
.mini{display:flex; flex-direction:column; gap:6px; margin-bottom:6px}
.mini .m{max-width:88%; padding:8px 12px; border-radius:16px; font-size:13px; line-height:1.4}
.mini .mu{align-self:flex-end; background:var(--lime-l); border:1px solid #DCE5C4;
  border-bottom-right-radius:6px}
.mini .mv{align-self:flex-start; background:var(--paper); border:1px solid var(--line);
  border-bottom-left-radius:6px}
.sh-line{border:none; border-top:1px solid var(--line); margin:12px 0}
.sh-num{text-align:center}
.sh-num .n{font-size:40px; font-weight:800; letter-spacing:-1.5px; color:var(--terra-d);
  font-variant-numeric:tabular-nums}
.sh-num .s{display:block; font-size:12px; color:var(--muted); margin-top:2px}
.sh-sum{text-align:center; font-size:14px; font-weight:600; margin:10px 4px 4px; line-height:1.45}
.sh-bar{text-align:center; font-size:12.5px; color:var(--muted); margin:0 6px; line-height:1.45}
.sh-url{text-align:center; font-size:10.5px; letter-spacing:.6px; color:var(--muted);
  margin-top:14px; opacity:.8}
.sh-btns{display:flex; gap:10px; width:100%; max-width:390px; margin-top:14px}
.sh-btns .cta{flex:1; animation:none}
.sh-btns .ghost{flex:none}
/* тост */
#toast{
  position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:var(--card); font-size:13.5px; padding:10px 18px;
  border-radius:16px; opacity:0; pointer-events:none; z-index:99;
  transition:all .4s var(--spring);
}
#toast.on{opacity:1; transform:translateX(-50%) translateY(0)}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001s!important; transition-duration:.001s!important}
  #chat{scroll-behavior:auto}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="ava">∿</div>
    <div class="who"><b>Внутренний голос</b><i id="st">онлайн</i></div>
    <div class="pills">
      <div class="pill" id="pillH"><b><span class="dot"></span><span id="numH">0</span></b><i>здоровье</i></div>
      <div class="pill" id="pillP"><b><span class="dot"></span><span id="numP">0</span></b><i id="labP">страдания</i></div>
    </div>
  </header>
  <main id="chat" aria-live="polite"></main>
  <footer id="dock"></footer>
</div>

<div id="share" role="dialog" aria-label="Поделиться перепиской">
  <div id="shcard"></div>
  <div class="sh-btns">
    <button class="ghost" id="shClose">Назад</button>
    <button class="cta" id="shGo">Поделиться</button>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';
/* ══════════ базис ══════════ */
var $ = function(s){ return document.querySelector(s); };
var chat = $('#chat'), dock = $('#dock');
var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var URL_SHORT = 'mirartalt-dotcom.github.io/dzen';
var LS_KEY = 'dzen-dialog-v1';

function sleep(ms){ return new Promise(function(r){ setTimeout(r, reduced ? Math.min(ms,150) : ms); }); }
function haptic(){ try{ if(navigator.vibrate) navigator.vibrate(12); }catch(e){} }
function fmt(n){ return n.toLocaleString('ru-RU'); }
function scrollBottom(){ chat.scrollTo({ top: chat.scrollHeight, behavior: reduced ? 'auto' : 'smooth' }); }
function status(t){ $('#st').textContent = t; }

function bubble(html, cls){
  var el = document.createElement('div');
  el.className = 'msg ' + (cls || 'voice');
  el.innerHTML = html;
  chat.appendChild(el);
  scrollBottom();
  return el;
}
var typingEl = null;
function showTyping(){
  if(typingEl) return;
  typingEl = document.createElement('div');
  typingEl.className = 'msg voice typing';
  typingEl.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(typingEl);
  scrollBottom();
  status('печатает…');
}
function hideTyping(){ if(typingEl){ typingEl.remove(); typingEl = null; } }
function voiceSay(html, extra){
  return new Promise(function(res){
    setTimeout(function(){
      showTyping();
      var d = 600 + Math.random() * 600 + (extra || 0);
      setTimeout(function(){
        hideTyping();
        bubble(html, 'voice');
        res();
      }, reduced ? 80 : d);
    }, reduced ? 40 : 260);
  });
}
function userSay(t){ bubble(t, 'user'); }

function countTo(el, to, dur, useFmt){
  var from = +(el.dataset.v || 0);
  el.dataset.v = to;
  var set = function(v){ el.textContent = useFmt ? fmt(v) : String(v); };
  if(reduced || !dur){ set(to); return; }
  var t0 = performance.now();
  (function frame(t){
    var k = Math.min(1, (t - t0) / dur);
    var e = 1 - Math.pow(1 - k, 3);
    set(Math.round(from + (to - from) * e));
    if(k < 1) requestAnimationFrame(frame);
  })(t0);
}
function bumpPill(id){
  var p = $(id);
  p.classList.remove('bump');
  void p.offsetWidth;
  p.classList.add('bump');
}
function toast(t){
  var el = $('#toast');
  el.textContent = t;
  el.classList.add('on');
  setTimeout(function(){ el.classList.remove('on'); }, 2400);
}
function pshh(){
  try{
    var AC = window.AudioContext || window.webkitAudioContext;
    var ctx = new AC();
    var len = Math.floor(ctx.sampleRate * 0.45);
    var buf = ctx.createBuffer(1, len, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for(var i = 0; i < len; i++){ d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2); }
    var src = ctx.createBufferSource(); src.buffer = buf;
    var f = ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1800;
    var g = ctx.createGain(); g.gain.value = 0.15;
    src.connect(f); f.connect(g); g.connect(ctx.destination);
    src.start();
  }catch(e){}
}

/* ══════════ канон: 5 вопросов ══════════ */
var QS = [
  { q: 'Начнём с простого. Вчера лёг спать до 23:00?', opts: [
    { t: 'Да. Горжусь и зеваю', h: 18, p: 14, hero: 1, spice: 2,
      r: 'Засчитано. Здоровье кивнуло, недосмотренный сезон обиделся.' },
    { t: 'Лёг вовремя. В 23:01 открыл телефон', h: 9, p: 7, hero: 0, spice: 4,
      r: 'Формально — сон. Фактически — кинотеатр одного зрителя.' },
    { t: 'Сон — для тех, у кого нет сериалов', h: 0, p: 0, hero: 0, spice: 3,
      r: 'Ни пользы, ни боли. Просто третий сезон и мешки под глазами.' } ] },
  { q: 'Так. Сладкое к чаю — берёшь?', opts: [
    { t: 'Не беру. Мы с печеньем больше не разговариваем', h: 12, p: 17, hero: 1, spice: 5,
      r: 'Оно так грустно на тебя смотрело. Ты сильнее. И заметно грустнее.' },
    { t: 'Беру маленькое. Маленькое не считается', h: 6, p: 8, hero: 0, spice: 4,
      r: 'Считается. Маленькое — просто чаще.' },
    { t: 'Чай без сладкого — горячая вода с упрёком', h: 0, p: 0, hero: 0, spice: 4,
      r: 'Понимаю. Упрёк ты и так носишь с собой.' } ] },
  { q: 'Зал. Только честно.', opts: [
    { t: 'Хожу. Через лень, как на подвиг', h: 23, p: 15, hero: 1, spice: 3,
      r: 'Диван считал тебя своим. Предательство засчитано.' },
    { t: 'Абонемент есть. Ходит без меня', h: 0, p: 4, hero: 0, spice: 5,
      r: 'Абонемент — самая дорогая форма надежды.' },
    { t: 'Моё кардио — лестница до лифта', h: 0, p: 0, hero: 0, spice: 4,
      r: 'Пульс спокойный. Совесть тоже — она давно сдалась.' } ] },
  { q: 'Телефон перед сном?', opts: [
    { t: 'Убираю в другую комнату. Как опасного зверя', h: 10, p: 12, hero: 1, spice: 3,
      r: 'Зверь скребётся, ты держишься. Это и называется «отдых».' },
    { t: 'Зашёл на минутку. Час назад', h: 0, p: 0, hero: 0, spice: 5,
      r: 'Лента передаёт привет. Уже завтрашняя.' },
    { t: 'Я и сейчас с телефона', h: 0, p: 0, hero: 0, spice: 4,
      r: 'Логично. Продолжаем прямо на месте преступления.' } ] },
  { q: 'Последний. Корзина на вайлдберриз — что с ней?', opts: [
    { t: 'Закрыл и не купил. Это инвестиция в себя', h: 8, p: 10, hero: 1, spice: 5,
      r: '«Инвестиция в себя» — четвёртый гаджет, который ты не открыл.' },
    { t: 'Там лежит моя новая жизнь. Пусть лежит', h: 4, p: 5, hero: 0, spice: 4,
      r: 'Корзина — бесплатный музей твоих желаний. Вход по силе воли.' },
    { t: 'Уже еду забирать', h: 0, p: 0, hero: 0, spice: 3,
      r: 'Пункт выдачи ждёт. Он всегда ждёт.' } ] }
];

function summaryPhrase(hero){
  if(hero >= 5) return 'Пять из пяти. Идеальный человек — и абсолютно вымотанный.';
  if(hero >= 3) return 'Три подвига за день. Ты почти святой, только злой и голодный.';
  if(hero >= 1) return 'Половина подвигов. Нимб уже светится, терпение уже мигает.';
  return 'Пока ты просто живёшь. Ни пользы, ни боли.';
}
function barnumLine(picked){
  if(picked[1] > 0) return 'Ты берёшь сладкое не от голода, а когда горит дедлайн.';
  if(picked[3] > 0) return 'Ты залипаешь в телефон не потому что интересно, а чтобы не думать про завтра.';
  if(picked[0] === 2) return 'Ты не ложишься позже — ты оттягиваешь завтрашний день.';
  if(picked[2] === 1) return 'Ты купил не абонемент — ты купил версию себя, у которой есть силы.';
  return 'Ты терпишь не ради здоровья — ради ощущения, что всё под контролем.';
}

/* ══════════ состояние ══════════ */
var health = 0, pain = 0, heroCount = 0;
var exchanges = []; // {u, v, spice}
var pickedIdx = [];
var yearPain = 0, episodes = 0, summary = '', barnum = '';

function loadPrev(){
  try{
    var raw = localStorage.getItem(LS_KEY);
    if(!raw) return null;
    var o = JSON.parse(raw);
    return (o && typeof o.pain === 'number') ? o : null;
  }catch(e){ return null; }
}
function savePrev(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify({
      pain: pain, health: health, hero: heroCount, date: new Date().toISOString().slice(0, 10)
    }));
  }catch(e){}
}

function choose(opts){
  return new Promise(function(res){
    dock.innerHTML = '';
    opts.forEach(function(o, i){
      var b = document.createElement('button');
      b.className = 'choice';
      b.style.animationDelay = (i * 80) + 'ms';
      b.textContent = o.t;
      b.onclick = function(){
        haptic();
        dock.innerHTML = '';
        userSay(o.t);
        res(o);
      };
      dock.appendChild(b);
    });
  });
}

function voiceNote(){
  var bars = '';
  for(var i = 0; i < 22; i++){
    var h = 6 + Math.round(Math.pow(Math.sin(i * 1.7), 2) * 14 + Math.random() * 4);
    bars += '<b style="height:' + h + 'px"></b>';
  }
  return new Promise(function(res){
    showTyping();
    setTimeout(function(){
      hideTyping();
      var el = bubble(
        '<div class="vnote"><button class="play" aria-label="Слушать">&#9654;</button>' +
        '<div class="wave">' + bars + '</div><span class="vtime">0:04</span></div>' +
        '<span class="vhint">нажми — я всё посчитал</span>', 'voice');
      status('записал голосовое');
      var btn = el.querySelector('.play');
      btn.onclick = function(){
        haptic();
        btn.disabled = true;
        btn.innerHTML = '&#9632;';
        el.classList.add('playing');
        var waveBars = el.querySelectorAll('.wave b');
        waveBars.forEach(function(bb, j){ bb.style.transitionDelay = (j * 70) + 'ms'; });
        var timeEl = el.querySelector('.vtime');
        var hint = el.querySelector('.vhint');
        if(hint) hint.remove();
        var s = 0;
        var iv = setInterval(function(){
          s++;
          timeEl.textContent = '0:0' + Math.min(s, 4);
          if(s >= 4){ clearInterval(iv); res(); }
        }, reduced ? 60 : 450);
      };
    }, reduced ? 60 : 900);
  });
}

function canCard(){
  bubble(
    '<div class="dzcard">' +
      '<div class="can"><b>DZEN</b><span>лайм · мята</span></div>' +
      '<div class="dzinfo"><b>DZEN</b> — газировка с пребиотиком' +
      '<p>0 г сахара · 3 вида пребиотика · &asymp;4 г клетчатки · без Е-шек</p>' +
      '<em>Единственная кнопка, где платят удовольствием.</em></div>' +
    '</div>', 'voice');
}

function flipCounter(){
  pshh();
  haptic();
  var pill = $('#pillP');
  pill.classList.add('joy');
  $('#labP').textContent = 'удовольствие';
  countTo($('#numP'), pain + 14, 900);
  countTo($('#numH'), health + 16, 900);
  bumpPill('#pillP');
  bumpPill('#pillH');
}

/* ══════════ шеринг ══════════ */
function shareText(){
  if(pain === 0){
    return 'Мой внутренний голос насчитал мне ноль страданий — я просто живу. Проверь, сколько терпишь ты: ' + URL_SHORT;
  }
  return 'Мой внутренний голос насчитал ' + fmt(yearPain) +
    ' единиц терпения в год — это ' + fmt(episodes) +
    ' серий сериала на гримасу «так надо». Спорим, у тебя меньше? ' + URL_SHORT;
}
function buildShareCard(){
  var top3 = exchanges
    .map(function(z, i){ return { u: z.u, v: z.v, spice: z.spice, i: i }; })
    .sort(function(a, b){ return b.spice - a.spice; })
    .slice(0, 3)
    .sort(function(a, b){ return a.i - b.i; });
  var mini = top3.map(function(z){
    return '<div class="mini"><div class="m mu">' + z.u + '</div><div class="m mv">' + z.v + '</div></div>';
  }).join('');
  var numBlock = pain === 0
    ? '<div class="sh-num"><span class="n">0</span><span class="s">страданий. просто живёшь</span></div>'
    : '<div class="sh-num"><span class="n">' + fmt(yearPain) + '</span>' +
      '<span class="s">единиц терпения в год &middot; &asymp;' + fmt(episodes) + ' серий сериала</span></div>';
  $('#shcard').innerHTML =
    '<div class="sh-title">переписка с внутренним голосом</div>' +
    mini +
    '<hr class="sh-line">' +
    numBlock +
    '<div class="sh-sum">' + summary + '</div>' +
    '<div class="sh-bar">' + barnum + '</div>' +
    '<div class="sh-url">DZEN &middot; польза, которую не надо терпеть &middot; ' + URL_SHORT + '</div>';
}
function openShare(){
  buildShareCard();
  $('#share').classList.add('open');
}
function doShare(){
  haptic();
  var txt = shareText();
  if(navigator.share){
    navigator.share({ text: txt }).catch(function(){});
  } else if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(
      function(){ toast('Скопировано — кидай другу'); },
      function(){ toast('Не вышло. Сделай скриншот — так даже лучше'); }
    );
  } else {
    toast('Сделай скриншот — так даже лучше');
  }
}
$('#shGo').onclick = doShare;
$('#shClose').onclick = function(){ haptic(); $('#share').classList.remove('open'); };

/* ══════════ основной поток ══════════ */
function finalDock(){
  dock.innerHTML = '';
  var share = document.createElement('button');
  share.className = 'cta';
  share.textContent = 'Показать эту переписку другу';
  share.onclick = function(){ haptic(); openShare(); };
  var again = document.createElement('button');
  again.className = 'ghost';
  again.textContent = 'Пройти ещё раз';
  again.onclick = function(){ location.reload(); };
  dock.appendChild(share);
  dock.appendChild(again);
  scrollBottom();
}

async function main(){
  var prev = loadPrev();
  await sleep(500);

  if(prev){
    await voiceSay('О. Старый знакомый.');
    await voiceSay('В прошлый раз я насчитал тебе <b>' + fmt(prev.pain * 365) +
      '</b> единиц терпения в год. Посмотрим, что изменилось.');
  } else {
    await voiceSay('Привет. Я твой внутренний голос. Да, тот самый.');
    await voiceSay('Сейчас посчитаем, сколько ты страдаешь, чтобы быть здоровым.');
    await voiceSay('Пять вопросов. Врать бессмысленно — я и так всё знаю.');
  }

  for(var i = 0; i < QS.length; i++){
    status('вопрос ' + (i + 1) + ' из 5');
    await voiceSay(QS[i].q);
    var o = await choose(QS[i].opts);
    pickedIdx.push(QS[i].opts.indexOf(o));
    health += o.h; pain += o.p; heroCount += o.hero;
    countTo($('#numH'), health, 500);
    countTo($('#numP'), pain, 500);
    bumpPill('#pillH'); bumpPill('#pillP');
    exchanges.push({ u: o.t, v: o.r, spice: o.spice });
    await voiceSay(o.r);
    if(i === 2){
      bubble('<span>итог уже считается… <b class="blur">' + fmt(pain * 365) + '</b></span>', 'sysnote');
      await sleep(600);
    }
  }

  yearPain = pain * 365;
  episodes = Math.max(1, Math.round(yearPain / 45));
  summary = summaryPhrase(heroCount);
  barnum = barnumLine(pickedIdx);

  status('считает…');
  await voiceSay('Так. У меня всё. Подожди, сведу дебет с кредитом.');
  await voiceNote();
  await sleep(reduced ? 60 : 500);

  if(pain === 0){
    bubble('<div class="result-num"><span class="n">0</span>' +
      '<span class="s">единиц терпения в год</span></div>', 'voice');
    haptic();
    await voiceSay('Ноль. Ты ничего не терпишь. Правда, и не получаешь ничего.');
  } else {
    var el = bubble('<div class="result-num"><span class="n" id="bigNum">0</span>' +
      '<span class="s">единиц терпения в год</span></div>', 'voice');
    haptic();
    countTo(el.querySelector('#bigNum'), yearPain, 1300, true);
    await sleep(reduced ? 60 : 1500);
    await voiceSay('Это примерно <b>' + fmt(episodes) +
      '</b> серий сериала, потраченных на гримасу «так надо».');
  }

  await voiceSay(summary);
  if(prev && prev.pain !== pain){
    var diff = pain - prev.pain;
    await voiceSay(diff < 0
      ? 'Кстати: минус ' + fmt(Math.abs(diff) * 365) + ' единиц терпения в год с прошлого раза. Растёшь.'
      : 'Кстати: с прошлого раза терпения прибавилось на ' + fmt(diff * 365) + ' в год. Держись там.');
  }
  await voiceSay('И ещё. Личное.');
  await voiceSay('<b>' + barnum + '</b>');

  await voiceSay('Есть способ проще.');
  canCard();
  await choose([{ t: 'Выпил DZEN' }]);
  flipCounter();
  await voiceSay('Выдох. Наконец польза, за которую не пришлось страдать.');
  await sleep(reduced ? 40 : 300);
  bubble('Польза, которую не надо терпеть.', 'voice final');
  scrollBottom();

  savePrev();
  await voiceSay('Завтра спрошу ещё раз. Ответы будут другие?');
  status('онлайн');
  finalDock();
}

main();
</script>
</body>
</html>
